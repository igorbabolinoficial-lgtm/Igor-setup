<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igor Babolin | Acesso Neural</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&family=Playfair+Display:wght@400;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0D0D0D;
            --surface: #141414;
            --surface-light: #1A1A1A;
            --accent: #A39688;
            --accent-glow: rgba(163, 150, 136, 0.3);
            --text: #F2F2F2;
            --text-muted: #888888;
            --border: rgba(255, 255, 255, 0.08);
            --danger: #F44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter Tight', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(163, 150, 136, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(163, 150, 136, 0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        .grain {
            position: absolute; inset: 0; opacity: 0.03; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 48px 44px;
            width: min(420px, 90vw);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px var(--border) inset,
                0 0 40px rgba(163, 150, 136, 0.05);
            position: relative;
            z-index: 1;
            animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }
        .brand .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: var(--accent);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .brand .name {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }
        .brand .sub {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.05em;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 0 0 28px 0;
        }

        .field {
            margin-bottom: 18px;
        }
        .field label {
            display: block;
            font-size: 0.62rem;
            color: var(--text-muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            background: #0A0A0A;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 13px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 13px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
            margin-top: 10px;
        }
        button:hover:not(:disabled) {
            background: #FFFFFF;
            box-shadow: 0 0 30px var(--accent-glow);
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        .error {
            background: rgba(244, 67, 54, 0.08);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 0.78rem;
            margin-top: 16px;
            display: none;
        }
        .error.show { display: block; animation: shake 0.4s ease; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.68rem;
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }
        .footer a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent);
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <form class="card" id="loginForm" autocomplete="on">
        <div class="brand">
            <div class="mono">Igor Babolin</div>
            <div class="name">Operação Neural</div>
            <div class="sub">Acesso restrito</div>
        </div>
        <div class="divider"></div>

        <div class="field">
            <label for="user">Usuário</label>
            <input id="user" name="user" type="text" required autofocus autocomplete="username" />
        </div>
        <div class="field">
            <label for="pass">Senha</label>
            <input id="pass" name="pass" type="password" required autocomplete="current-password" />
        </div>

        <button type="submit" id="btn">Entrar</button>

        <div class="error" id="err"></div>

        <div class="footer">
            <a href="/">site público</a>
        </div>
    </form>

    <script>
        const form = document.getElementById('loginForm');
        const btn = document.getElementById('btn');
        const err = document.getElementById('err');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.classList.remove('show');
            btn.disabled = true;
            btn.textContent = 'Validando...';

            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            try {
                const r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass }),
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.erro || 'Credenciais inválidas');
                // Sucesso: redireciona pra rota original ou dashboard
                const params = new URLSearchParams(location.search);
                let next = params.get('next') || '/dashboard.html';
                // Anti-loop: se next aponta pra própria login, ignora
                if (next.includes('/login.html')) next = '/dashboard.html';
                location.href = next;
            } catch (e) {
                err.textContent = e.message || 'Falha no login';
                err.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
