<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#0a0a0a; font-family:'Poppins','Segoe UI',system-ui,sans-serif; }

  /* O #arte recebe a classe do formato; dimensões definidas por formato */
  #arte { position:relative; overflow:hidden; background:#111; color:#fff; }
  #arte.story      { width:1080px; height:1920px; }
  #arte.feed       { width:1080px; height:1350px; }
  #arte.quadrado   { width:1080px; height:1080px; }
  #arte.horizontal { width:1200px; height:628px; }

  .hero { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; }
  .scrim { position:absolute; inset:0; z-index:1;
    background:linear-gradient(to bottom,
      rgba(0,0,0,.45) 0%, rgba(0,0,0,.05) 22%, rgba(0,0,0,.05) 40%,
      rgba(0,0,0,.80) 70%, rgba(0,0,0,.95) 100%); }

  .selo { position:absolute; top:48px; left:50%; transform:translateX(-50%); z-index:3;
    background:rgba(0,0,0,.55); border:2px solid rgba(201,168,74,.55); color:#f3e3b5;
    font-size:26px; font-weight:600; letter-spacing:2px; padding:14px 34px; border-radius:60px;
    text-transform:uppercase; white-space:nowrap; }

  .content { position:absolute; left:0; right:0; bottom:0; z-index:2; padding:0 56px 56px; }
  .titulo { font-weight:800; line-height:1.05; letter-spacing:-1px; text-shadow:0 4px 18px rgba(0,0,0,.5); font-size:64px; }
  .titulo .gold { color:#e0bd5e; display:block; }
  .subtitulo { font-size:36px; font-weight:300; color:#eee; margin-top:4px; text-transform:uppercase; letter-spacing:1px; }

  .checks { margin:34px 0 30px; display:flex; flex-direction:column; gap:20px; }
  .checks li { list-style:none; display:flex; align-items:flex-start; gap:20px; font-size:34px; font-weight:400; line-height:1.25; }
  .checks .ck { flex-shrink:0; width:42px; height:42px; margin-top:2px; border:3px solid #e0bd5e; border-radius:50%;
    display:flex; align-items:center; justify-content:center; color:#e0bd5e; font-size:22px; font-weight:700; }

  .preco { font-size:80px; font-weight:800; color:#e7c768; letter-spacing:-2px; text-shadow:0 4px 14px rgba(0,0,0,.45); }
  .badges { display:flex; gap:18px; margin-top:22px; flex-wrap:wrap; }
  .badge { display:flex; align-items:center; gap:13px; border:2px solid rgba(201,168,74,.5); border-radius:60px;
    padding:13px 30px; font-size:25px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:#f0dfa8; }
  .badge .pt { width:13px; height:13px; border-radius:50%; background:#e0bd5e; }

  .mosaic { display:flex; gap:12px; margin:40px -56px -56px; }
  .mosaic img { width:50%; height:420px; object-fit:cover; display:block; }

  /* ---------- FEED 4:5 — proporções menores, sem mosaico ---------- */
  #arte.feed .titulo { font-size:62px; }
  #arte.feed .mosaic { display:none; }

  /* ---------- QUADRADO 1:1 — compacto, sem mosaico ---------- */
  #arte.quadrado .selo { top:36px; font-size:22px; padding:11px 26px; }
  #arte.quadrado .titulo { font-size:54px; }
  #arte.quadrado .subtitulo { font-size:30px; }
  #arte.quadrado .checks { margin:24px 0 22px; gap:14px; }
  #arte.quadrado .checks li { font-size:28px; }
  #arte.quadrado .preco { font-size:64px; }
  #arte.quadrado .content { padding:0 48px 48px; }
  #arte.quadrado .mosaic { display:none; }

  /* ---------- HORIZONTAL 1.91:1 — split: foto esq, painel dir ---------- */
  #arte.horizontal { display:flex; }
  #arte.horizontal .hero { position:absolute; left:0; top:0; width:58%; height:100%; }
  #arte.horizontal .scrim { left:0; width:58%;
    background:linear-gradient(to right, rgba(0,0,0,.25) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,.55) 100%); }
  #arte.horizontal .selo { left:auto; right:40px; transform:none; top:34px; font-size:18px; padding:9px 20px; }
  #arte.horizontal .painel { position:absolute; right:0; top:0; width:42%; height:100%; z-index:2;
    background:linear-gradient(135deg,#15110a,#221a0e); display:flex; flex-direction:column; justify-content:center;
    padding:54px 50px; }
  #arte.horizontal .content { position:static; padding:0; }
  #arte.horizontal .titulo { font-size:46px; }
  #arte.horizontal .subtitulo { font-size:24px; }
  #arte.horizontal .checks { margin:22px 0 20px; gap:12px; }
  #arte.horizontal .checks li { font-size:24px; }
  #arte.horizontal .checks .ck { width:32px; height:32px; font-size:17px; }
  #arte.horizontal .preco { font-size:58px; }
  #arte.horizontal .badge { font-size:18px; padding:9px 20px; }
  #arte.horizontal .mosaic { display:none; }
  /* no horizontal, o painel não tem foto de fundo — esconde o scrim do painel */
  #arte.horizontal .painel-wrap { display:contents; }

  .compass { position:absolute; top:46px; right:44px; z-index:3; width:54px; height:54px; opacity:.85;
    display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#fff; }
  #arte.horizontal .compass { display:none; }
</style>
</head>
<body>
<div id="arte"><!-- preenchido por render() --></div>

<script>
function fmtPreco(v) {
  if (!v) return '';
  return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 0 });
}

function render(d) {
  const arte = document.getElementById('arte');
  arte.className = d.formato || 'story';

  const heroSrc  = d.fotos && d.fotos[0] ? d.fotos[0] : '';
  const mos1 = d.fotos && d.fotos[1] ? d.fotos[1] : heroSrc;
  const mos2 = d.fotos && d.fotos[2] ? d.fotos[2] : heroSrc;

  const checksHtml = (d.checks || []).map(c => `<li><span class="ck">✓</span>${c}</li>`).join('');
  const badgesHtml = (d.badges || []).map(b => `<span class="badge"><span class="pt"></span>${b}</span>`).join('');

  const compass = `<div class="compass"><svg viewBox="0 0 54 54" width="54" height="54"><path d="M27 5 L32 27 L27 24 L22 27 Z" fill="#fff"/><path d="M27 49 L22 27 L27 30 L32 27 Z" fill="#bbb"/></svg><span style="position:absolute;top:-5px">N</span></div>`;

  const conteudo = `
    <div class="titulo">${d.tituloGold ? `<span class="gold">${d.titulo}</span>` : d.titulo}</div>
    ${d.subtitulo ? `<div class="subtitulo">${d.subtitulo}</div>` : ''}
    <ul class="checks">${checksHtml}</ul>
    <div class="preco">${fmtPreco(d.preco)}</div>
    <div class="badges">${badgesHtml}</div>
    ${(d.formato === 'story') ? `<div class="mosaic"><img src="${mos1}"><img src="${mos2}"></div>` : ''}
  `;

  if (d.formato === 'horizontal') {
    arte.innerHTML = `
      <img class="hero" src="${heroSrc}">
      <div class="scrim"></div>
      <div class="selo">${d.selo || ''}</div>
      <div class="painel"><div class="content">${conteudo}</div></div>`;
  } else {
    arte.innerHTML = `
      <img class="hero" src="${heroSrc}">
      <div class="scrim"></div>
      <div class="selo">${d.selo || ''}</div>
      ${compass}
      <div class="content">${conteudo}</div>`;
  }
}

// Dados injetados via window.__DADOS__ (setado pelo puppeteer antes do render)
if (window.__DADOS__) render(window.__DADOS__);
</script>
</body>
</html>
